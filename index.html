<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Etch-A-Sketch</h1>
        
        <!-- Button to change grid size -->
        <button id="gridSizeBtn">Change Grid Size</button>
        
        <!-- Optional: Extra credit buttons -->
        <button id="randomColorBtn">Random Colors</button>
        <button id="darkenBtn">Progressive Darken</button>
        <button id="resetBtn">Reset Grid</button>
        
        <!-- Grid container -->
        <div id="gridContainer"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
